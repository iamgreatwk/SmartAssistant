<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小智 AI 调试器</title>
<style>
  :root { --bg: #0a0a0f; --panel: #111118; --border: #1e1e2e; --text: #c8c8d0; --green: #7cfc00; --accent: #3b82f6; --danger: #ef4444; --muted: #555; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  
  /* Top bar */
  #topBar { display: flex; gap: 10px; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  #topBar label { font-size: 11px; color: var(--muted); }
  #topBar input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px; min-width: 120px; }
  #topBar input:focus { outline: none; border-color: var(--accent); }
  #topBar button { background: var(--accent); color: #fff; border: none; padding: 5px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  #topBar button:hover { opacity: 0.85; }
  #topBar button.danger { background: var(--danger); }
  #balance { font-weight: 700; font-size: 13px; color: var(--green); min-width: 80px; }

  /* Main */
  #main { flex: 1; display: flex; gap: 1px; overflow: hidden; }
  #left { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; min-width: 300px; }
  #left svg { width: 100%; height: auto; max-height: 100%; }
  #right { width: 420px; display: flex; flex-direction: column; background: var(--panel); border-left: 1px solid var(--border); }

  /* Chat */
  #chatBox { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg .bubble { max-width: 280px; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
  .msg.ai .bubble { background: #1e1e2e; color: var(--text); border-bottom-left-radius: 3px; }
  .msg .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #222; color: var(--muted); white-space: nowrap; }
  .msg .tag[data-emotion] { background: #1a3a1a; color: var(--green); }

  /* Input */
  #inputBar { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
  #inputBar input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-size: 14px; }
  #inputBar input:focus { outline: none; border-color: var(--accent); }
  #inputBar button { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; }

  /* Sensor Buttons */
  #sensorBar { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 12px; border-top: 1px solid var(--border); }
  #sensorBar button { background: #1a2a1a; color: var(--green); border: 1px solid #1e3a1e; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  #sensorBar button:hover { background: #1e3a1e; border-color: var(--green); }
  #sensorBar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  /* Sensor Params Panel */
  #sensorParams { padding: 6px 12px; border-top: 1px solid var(--border); display: none; }
  #sensorParams.show { display: block; }
  #sensorParams .row { display: flex; gap: 8px; align-items: center; margin: 3px 0; }
  #sensorParams label { font-size: 10px; color: var(--muted); min-width: 48px; }
  #sensorParams input[type=range] { flex: 1; accent-color: var(--accent); }
  #sensorParams input[type=text], #sensorParams input[type=number] { width: 56px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 2px 4px; border-radius: 3px; font-size: 11px; text-align: center; }
  #sensorParams .val { font-size: 10px; color: var(--green); min-width: 28px; text-align: right; }
  #sensorParams button { background: var(--accent); color: #fff; border: none; padding: 4px 14px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 4px; }
  #sensorParams .divider { border-top: 1px solid var(--border); margin: 4px 0; }
  
  /* Sensor Dashboard */
  #sensorDash { padding: 8px 12px; border-top: 1px solid var(--border); display: none; max-height: 280px; overflow-y: auto; }
  #sensorDash.show { display: block; }
  #sensorDash .srow { display: flex; gap: 6px; align-items: center; margin: 2px 0; }
  #sensorDash .srow label { font-size: 10px; color: var(--muted); min-width: 50px; }
  #sensorDash .srow input[type=range] { flex: 1; accent-color: var(--green); height: 4px; }
  #sensorDash .srow .val { font-size: 10px; color: var(--green); min-width: 32px; text-align: right; }
  #sensorDash .srow input[type=checkbox] { accent-color: var(--green); }
  #sensorDash .fire { font-size: 10px; color: var(--accent); margin-top: 4px; }

  /* Debug log */
  #logArea { border-top: 1px solid var(--border); max-height: 120px; overflow-y: auto; padding: 6px 12px; }
  #logArea .log { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: var(--green); padding: 2px 0; white-space: pre-wrap; word-break: break-all; }
  #logArea .log.error { color: var(--danger); }
  #logArea .log.info { color: var(--accent); }

  /* Responsive */
  @media (max-width: 768px) {
    #main { flex-direction: column; }
    #left { height: 40vh; min-width: unset; }
    #right { width: 100%; flex: 1; border-left: none; border-top: 1px solid var(--border); }
    #topBar { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- Top Bar: API Config + Balance -->
<div id="topBar">
  <label>端点</label><input id="apiEndpoint" placeholder="https://api.siliconflow.cn/v1/chat/completions">
  <label>模型</label><input id="aiModel" placeholder="deepseek-ai/DeepSeek-V4-Flash" style="min-width:200px">
  <label>Key</label><input id="apiKey" type="password" placeholder="sk-...">
  <label>余额API</label><input id="balanceApi" placeholder="https://api.siliconflow.cn/v1/user/info">
  <button onclick="fetchBalance()">查余额</button>
  <span id="balance">--</span>
  <button class="danger" onclick="clearChat()">清空对话</button>
  <select id="soundTest" style="background:var(--bg);color:var(--text);border:1px solid var(--border);font-size:11px;padding:3px;border-radius:3px;max-width:100px" onchange="if(this.value)testSound(this.value)"><option value="">▶ 音效</option></select>
  <label style="cursor:pointer" title="加载iOS的expressions.json">
    <input type="file" id="jsonFile" accept=".json" style="display:none" onchange="loadJSON(this)">📂 JSON
  </label>
  <label title="绕过CORS: python proxy.py"><input type="checkbox" id="useProxy" onchange="saveConfig()"> 代理</label>
  <span id="jsonStatus" style="font-size:11px;color:var(--muted)">未加载</span>
</div>

<!-- Main Area -->
<div id="main">
  <!-- Left: RoboEyes -->
  <div id="left">
    <svg id="face" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <!-- Right: Chat + Debug -->
  <div id="right">
    <div id="chatBox"></div>
    <div id="inputBar">
      <input id="userInput" placeholder="输入文字测试 AI 情绪..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
    </div>
    <div id="sensorBar"></div>
    <div id="sensorParams"></div>
    <div id="sensorDash"></div>
    <div id="logArea"></div>
  </div>
</div>

<script>
// ===== RoboEyes 渲染=====
const W=400,H=200,CX=200,CY=100,MC='#7cfc00',BG_COLOR='#000';
const L=(a,b)=>(a+b)/2;
const MOODS={normal:{w:70,h:58,br:24,sb:20,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},tired:{w:72,h:56,br:20,sb:22,lT:.5,rT:.5,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},angry:{w:68,h:56,br:18,sb:18,lT:0,rT:0,lA:.5,rA:.5,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},happy:{w:64,h:50,br:22,sb:22,lT:0,rT:0,lA:0,rA:0,lH:.48,rH:.48,lF:0,rF:0,lM:1,rM:1,yo:0},surprised:{w:78,h:72,br:32,sb:16,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},sad:{w:64,h:50,br:22,sb:26,lT:.25,rT:.25,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:4},scared:{w:52,h:46,br:18,sb:36,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:-2},confused:{w:70,h:62,br:22,sb:20,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:.65,yo:-8},focused:{w:62,h:48,br:16,sb:14,lT:0,rT:0,lA:.15,rA:.15,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},bored:{w:70,h:44,br:12,sb:24,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:.35,rF:.35,lM:1,rM:1,yo:2},sleepy:{w:68,h:28,br:12,sb:24,lT:.65,rT:.65,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:6},suspicious:{w:68,h:56,br:20,sb:20,lT:0,rT:0,lA:.45,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:.85,yo:0},love:{w:56,h:56,br:28,sb:24,lT:0,rT:0,lA:0,rA:0,lH:.55,rH:.55,lF:0,rF:0,lM:1,rM:1,yo:0},dizzy:{w:66,h:56,br:20,sb:22,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:.8,rM:1.2,yo:6},wink:{w:70,h:58,br:24,sb:20,lT:0,rT:0,lA:0,rA:0,lH:.3,rH:0,lF:0,rF:0,lM:1,rM:.08,yo:0},proud:{w:66,h:52,br:22,sb:22,lT:0,rT:0,lA:0,rA:0,lH:.2,rH:.2,lF:0,rF:0,lM:1,rM:1,yo:-6},listening:{w:74,h:62,br:26,sb:18,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},thinking:{w:62,h:48,br:16,sb:14,lT:0,rT:0,lA:.15,rA:.15,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},shy:{w:56,h:56,br:26,sb:24,lT:0,rT:0,lA:0,rA:0,lH:.4,rH:.4,lF:0,rF:0,lM:1,rM:1,yo:0},cool:{w:66,h:52,br:22,sb:22,lT:0,rT:0,lA:0,rA:0,lH:.2,rH:.2,lF:0,rF:0,lM:1,rM:1,yo:-6}};
const ALIAS={veryHappy:'happy',excited:'surprised',speaking:'normal',dizzy:'confused',tired:'sleepy',proud:'cool'};
const EMOJI={normal:'😊',happy:'😄',veryHappy:'🤣',sad:'😢',angry:'😠',surprised:'😲',thinking:'🤔',listening:'👂',speaking:'🗣️',sleepy:'😴',wink:'😉',love:'🥰',confused:'😵',cool:'😎',shy:'😳',excited:'🤩',scared:'😨',bored:'😑',focused:'🧐',suspicious:'🤨'};
const DISPLAY={normal:'正常',happy:'开心',veryHappy:'非常开心',sad:'难过',angry:'生气',surprised:'惊讶',thinking:'思考中',listening:'倾听中',speaking:'说话中',sleepy:'困了',wink:'眨眼',love:'喜欢',confused:'困惑',cool:'酷',shy:'害羞',excited:'兴奋',scared:'害怕',bored:'无聊',focused:'专注',suspicious:'怀疑'};

let S={lxN:120,lyN:71,wN:70,hN:58,brN:24,sbN:20,lhN:58,rhN:58,lx:120,ly:71,w:70,h:58,br:24,sb:20,lh:58,rh:58,rx:0,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lTN:0,rTN:0,lAN:0,rAN:0,lHN:0,rHN:0,lFN:0,rFN:0,yoN:0,myo:0,nextBlink:180,dirty:true};

function setMood(n){
  const m=MOODS[ALIAS[n]||n]||MOODS['normal'];
  S.wN=m.w;S.hN=m.h;S.brN=m.br;S.sbN=m.sb;
  S.lhN=m.h*m.lM;S.rhN=m.h*m.rM;
  S.lTN=m.lT;S.rTN=m.rT;S.lAN=m.lA;S.rAN=m.rA;
  S.lHN=m.lH;S.rHN=m.rH;S.lFN=m.lF;S.rFN=m.rF;S.yoN=m.yo;
  S.lxN=CX-S.wN-S.sbN/2;S.lyN=CY-Math.max(S.lhN,S.rhN)/2;
  S.dirty=true;
}
function setLook(x,y){S.lxN=CX+x*50-S.wN-S.sbN/2;S.lyN=CY-y*40-Math.max(S.lhN,S.rhN)/2;S.dirty=true;}

function dE(lx,ly,w,h,br,tired,angry,happy,flat,tag){
  let s='';if(h<=0)return s;
  s+=`<rect x="${lx}" y="${ly}" width="${w}" height="${h}" rx="${br}" ry="${br}" fill="${MC}"/>`;
  if(flat>.05){let fh=h*flat;s+=`<rect x="${lx-1}" y="${ly-1}" width="${w+2}" height="${fh+1}" fill="${BG_COLOR}"/>`;}
  if(tired>.05){let th=h*tired;
    s+=tag==='L'?`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx},${ly+th-1}" fill="${BG_COLOR}"/>`
      :`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx+w},${ly+th-1}" fill="${BG_COLOR}"/>`;}
  if(angry>.05){let ah=h*angry;
    s+=tag==='L'?`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx+w},${ly+ah}" fill="${BG_COLOR}"/>`
      :`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx},${ly+ah}" fill="${BG_COLOR}"/>`;}
  if(happy>.05){let hh=h*happy;s+=`<rect x="${lx-1}" y="${ly+h-hh+1}" width="${w+2}" height="${h}" rx="${br}" fill="${BG_COLOR}"/>`;}
  return s;
}

let lastSVG='';
function render(){
  S.lx=L(S.lx,S.lxN);S.ly=L(S.ly,S.lyN);S.w=L(S.w,S.wN);S.h=L(S.h,S.hN);
  S.br=L(S.br,S.brN);S.sb=L(S.sb,S.sbN);S.lh=L(S.lh,S.lhN);S.rh=L(S.rh,S.rhN);
  S.lT=L(S.lT,S.lTN);S.rT=L(S.rT,S.rTN);S.lA=L(S.lA,S.lAN);S.rA=L(S.rA,S.rAN);
  S.lH=L(S.lH,S.lHN);S.rH=L(S.rH,S.rHN);S.lF=L(S.lF,S.lFN);S.rF=L(S.rF,S.rFN);
  let yo=L(S.myo||0,S.yoN);S.myo=yo;
  let lw=S.w,rw=S.w,sb=S.sb;S.rx=S.lx+lw+sb;
  S.nextBlink--;let blink=S.nextBlink<6;
  let lh=blink?1:S.lh,rh=blink?1:S.rh;
  if(blink&&S.nextBlink===0){S.nextBlink=150+Math.floor(Math.random()*360);}
  let h=`<rect width="${W}" height="${H}" fill="${BG_COLOR}"/>`;
  h+=dE(S.lx,S.ly+yo,lw,lh,S.br,S.lT,S.lA,S.lH,S.lF,'L');
  h+=dE(S.rx,S.ly+yo,rw,rh,S.br,S.rT,S.rA,S.rH,S.rF,'R');
  if(h!==lastSVG){lastSVG=h;document.getElementById('face').innerHTML=h;}
  requestAnimationFrame(render);
}
setMood('normal');
render();

// ===== JSON 配置系统 =====
let exprCfg={
  moods:{}, emotionKeywords:{}, emotionClusters:{}, emotionToSequence:{}, sequences:{},
  petEmpathy:{}, commands:{}, sensorTriggers:{}, idleExpressions:[], listeningExpressions:[], thinkingExpressions:[]
};
let jsonLoaded=false;

function loadJSON(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const json=JSON.parse(e.target.result);
      // 转换 moods: JSON 键名 → HTML 内部格式
      exprCfg.moods={};
      if(json.moods){
        for(const[k,v] of Object.entries(json.moods)){
          exprCfg.moods[k]={w:v.eyeW,h:v.eyeH,br:v.br,sb:v.sb,
            lT:v.lT||0,rT:v.rT||0,lA:v.lA||0,rA:v.rA||0,lH:v.lH||0,rH:v.rH||0,lF:v.lF||0,rF:v.rF||0,
            lM:v.lM||1,rM:v.rM||1,yo:v.yo||0};
        }
      }
      exprCfg.emotionKeywords=json.emotionKeywords||{};
      exprCfg.emotionClusters=json.emotionClusters||{};
      exprCfg.emotionToSequence=json.emotionToSequence||{};
      exprCfg.sequences=json.sequences||{};
      exprCfg.petEmpathy=json.petEmpathy||{};
      exprCfg.commands=json.commands||{};
      exprCfg.sensorTriggers=json.sensorTriggers||{};
      exprCfg.idleExpressions=json.idleExpressions||[];
      exprCfg.listeningExpressions=json.listeningExpressions||[];
      exprCfg.thinkingExpressions=json.thinkingExpressions||[];
      exprCfg.shake=json.shake||{threshold:1.2,spikeCount:2,dizzySeconds:3,e:'confused',s:'dizzy'};
      exprCfg.knock=json.knock||{threshold:0.5,recoverSeconds:0.6,e:'surprised',s:'happy',lx:0,ly:-0.4};
      exprCfg.speakingDurationSec=json.speakingDurationSec||5.0;
      exprCfg.commandDurationSec=json.commandDurationSec||3.0;

      // JSON moods 覆盖默认 MOODS
      Object.assign(MOODS, exprCfg.moods);

      // 重建传感器按钮
      rebuildSensors();

      // 填充音效下拉
      const sel=document.getElementById('soundTest');
      sel.innerHTML='<option value="">▶ 音效</option>';
      if(json.soundMap) for(const[k,v] of Object.entries(json.soundMap)){
        sel.innerHTML+=`<option value="${k}">${k}</option>`;
      }

      jsonLoaded=true;
      document.getElementById('jsonStatus').textContent='已加载 ('+file.name+')';
      document.getElementById('jsonStatus').style.color='var(--green)';
      log(`JSON: ${Object.keys(json.moods||{}).length}表情 ${Object.keys(json.commands||{}).length}指令 ${Object.keys(json.sensorTriggers||{}).length}传感器`, 'info');
    }catch(err){
      log('JSON 解析失败: '+err.message, 'error');
    }
  };
  reader.readAsText(file);
}

// ===== 传感器模拟（参数化）=====
const SENSOR_DEFAULTS=[
  {id:'shake',label:'晃动',emoji:'🤪',expr:'confused',seq:'dizzy',sec:3,
    params:[{key:'accelG',label:'加速度(g)',min:1,max:5,step:0.1,val:2.5},{key:'spikeCount',label:'连续尖峰',min:1,max:10,step:1,val:3}]},
  {id:'upsideDown',label:'倒置',emoji:'🙃',expr:'surprised',seq:'surprise',sec:2.5,
    params:[{key:'pitch',label:'俯仰角(°)',min:-90,max:0,step:1,val:-35}]},
  {id:'tilted',label:'倾斜',emoji:'🫨',expr:'confused',sec:2,
    params:[{key:'roll',label:'横滚角(°)',min:10,max:90,step:1,val:35}]},
  {id:'fastSpin',label:'旋转',emoji:'😵',expr:'confused',seq:'dizzy',sec:3,
    params:[{key:'gyroRate',label:'角速率(°/s)',min:50,max:600,step:5,val:300}]},
  {id:'fastMoving',label:'快移',emoji:'🏃',expr:'excited',sec:3,
    params:[{key:'speedKmh',label:'速度(km/h)',min:5,max:40,step:1,val:15}]},
  {id:'freeFall',label:'掉落',emoji:'🫣',expr:'scared',seq:'surprise',sec:3,
    params:[{key:'accelBelow',label:'加速度低于(g)',min:0.05,max:0.8,step:0.05,val:0.3}]},
  {id:'stillLong',label:'静止',emoji:'😴',expr:'sleepy',sec:4,
    params:[{key:'stillSeconds',label:'静止时长(s)',min:10,max:300,step:10,val:60}]},
  {id:'lightDark',label:'黑暗',emoji:'🌑',expr:'sleepy',sec:4,
    params:[{key:'luxBelow',label:'光照低于(lux)',min:1,max:50,step:1,val:10}]},
  {id:'altitudeUp',label:'上升',emoji:'🛗',expr:'surprised',seq:'surprise',sec:3,
    params:[{key:'altChange',label:'高度变化(m)',min:0.5,max:10,step:0.5,val:3}]},
  {id:'altitudeDown',label:'下降',emoji:'🪂',expr:'scared',seq:'surprise',sec:3,

let currentSensors=[...SENSOR_DEFAULTS];
let sensorTimer=null, activeSensor=null, selectedSensor=null;

function rebuildSensors(){
  currentSensors=[];
  if(jsonLoaded && Object.keys(exprCfg.sensorTriggers).length>0){
    const labels={upsideDown:'倒置',tilted:'倾斜',fastSpin:'旋转',fastMoving:'快移',freeFall:'掉落',stillLong:'静止',lightDark:'黑暗',altitudeUp:'上升',altitudeDown:'下降',faceClose:'靠近',pickedUp:'拿起'};
    const emojis={upsideDown:'🙃',tilted:'🫨',fastSpin:'😵',fastMoving:'🏃',freeFall:'🫣',stillLong:'😴',lightDark:'🌑',altitudeUp:'🛗',altitudeDown:'🪂',faceClose:'🫣',pickedUp:'✋'};
    for(const[k,v] of Object.entries(exprCfg.sensorTriggers)){
      const params=[];
      for(const[pk,pv] of Object.entries(v)){
        if(pk==='e'||pk==='s'||pk==='t') continue;
        params.push({key:pk,label:pk,min:pv*0.1,max:pv*3,step:pv*0.1,val:pv});
      }
      currentSensors.push({id:k,label:labels[k]||k,emoji:emojis[k]||'📡',expr:v.e,seq:v.s,sec:v.t||3,params});
    }
  }
  if(!currentSensors.length) currentSensors=[...SENSOR_DEFAULTS];
  
  // 保留用户修改过的参数值
  if(selectedSensor){
    for(const s of currentSensors){
      if(s.id===selectedSensor.id){
        for(const p of s.params){
          const old=selectedSensor.params.find(o=>o.key===p.key);
          if(old) p.val=old.val;
        }
        break;
      }
    }
  }
  selectedSensor=null;
  buildSensorBar();
}

function buildSensorBar(){
  const bar=document.getElementById('sensorBar');
  bar.innerHTML='';
  // 传感器模拟器切换按钮
  const toggleBtn=document.createElement('button');
  toggleBtn.textContent='📡 模拟器';
  toggleBtn.style.background='#1a1a2a';
  toggleBtn.style.borderColor='#2a2a4a';
  toggleBtn.style.color='var(--accent)';
  toggleBtn.onclick=()=>{
    const d=document.getElementById('sensorDash');
    d.classList.toggle('show');
    if(d.classList.contains('show')&&!dashBuilt) buildSensorDash();
  };
  bar.appendChild(toggleBtn);
  
  currentSensors.forEach(s=>{
    const btn=document.createElement('button');
    btn.id='sensor-'+s.id;
    btn.title=s.params.map(p=>p.label+':'+p.val).join(', ');
    btn.textContent=s.emoji+' '+s.label;
    btn.onclick=()=>selectSensor(s);
    bar.appendChild(btn);
  });
}

function selectSensor(s){
  selectedSensor=s;
  document.getElementById('sensorParams').classList.add('show');
  renderSensorParams(s);
}

function renderSensorParams(s){
  const panel=document.getElementById('sensorParams');
  let html=`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">${s.emoji} ${s.label} 参数</div>`;
  
  // 表情
  html+=`<div class="row"><label>表情</label><input type="text" id="sp-expr" value="${s.expr}" style="width:80px"><span class="val">→ ${DISPLAY[s.expr]||s.expr}</span></div>`;
  // 持续
  html+=`<div class="row"><label>持续(s)</label><input type="range" id="sp-sec" min="0.5" max="10" step="0.5" value="${s.sec}" oninput="document.getElementById('sp-sec-v').textContent=this.value"><span class="val" id="sp-sec-v">${s.sec}</span></div>`;
  
  // 传感器参数
  if(s.params.length) html+='<div class="divider"></div>';
  s.params.forEach((p,i)=>{
    html+=`<div class="row"><label>${p.label}</label><input type="range" id="sp-p${i}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.val}" oninput="document.getElementById('sp-v${i}').textContent=this.value"><span class="val" id="sp-v${i}">${p.val}</span></div>`;
  });
  
  // 按钮
  html+=`<div style="display:flex;gap:6px;margin-top:6px">
    <button onclick="applySensorParams('${s.id}')">保存</button>
    <button onclick="simSensor(currentSensors.find(x=>x.id==='${s.id}'))" style="background:#1a3a1a;color:var(--green);border:1px solid var(--green)">模拟</button>
    <button onclick="document.getElementById('sensorParams').classList.remove('show')" style="background:var(--bg);color:var(--muted);border:1px solid var(--border)">关闭</button>
  </div>`;
  
  panel.innerHTML=html;
}

function applySensorParams(id){
  const s=currentSensors.find(x=>x.id===id);
  if(!s) return;
  s.expr=document.getElementById('sp-expr').value||s.expr;
  s.sec=parseFloat(document.getElementById('sp-sec').value)||s.sec;
  s.params.forEach((p,i)=>{
    const el=document.getElementById('sp-p'+i);
    if(el) p.val=parseFloat(el.value)||p.val;
  });
  
  // 更新按钮 tooltip
  const btn=document.getElementById('sensor-'+s.id);
  if(btn) btn.title=s.params.map(p=>p.key+':'+p.val).join(', ');
  
  renderSensorParams(s);
  log(`[参数] ${s.label}: expr=${s.expr} sec=${s.sec}s ${s.params.map(p=>p.key+'='+p.val).join(' ')}`,'info');
}

function simSensor(s){
  if(sensorTimer){ clearTimeout(sensorTimer); sensorTimer=null; }
  if(activeSensor){ document.getElementById('sensor-'+activeSensor)?.classList.remove('active'); }
  
  const btn=document.getElementById('sensor-'+s.id);
  btn.classList.add('active');
  activeSensor=s.id;
  stopIdleCycle();
  
  setMood(s.expr);
  if(s.seq) playSensorSequence(s.seq);
  autoPlaySound(s.expr);
  log(`[传感器] ${s.label} 触发 (${s.params.map(p=>p.key+'='+p.val).join(', ')}) → ${DISPLAY[s.expr]||s.expr}`,'info');
  
  sensorTimer=setTimeout(()=>{
    btn.classList.remove('active');
    activeSensor=null;
    setMood('normal');
    startIdleCycle();
    log(`[传感器] ${s.label}: 恢复`,'info');
  },s.sec*1000);
}

function playSensorSequence(name){
  const moves={dizzy:[0,0,0.4,0,-0.4,0,0.4,0,-0.4,0,0,0],surprise:[0,-0.5,0,0],greeting:[0,0,0.4,0,-0.4,0,0]};
  const seq=moves[name]||[0,0];
  let i=0;
  const ival=setInterval(()=>{
    if(i>=seq.length){ clearInterval(ival); setLook(0,0); return; }
    setLook(seq[i],seq[i+1]||0);
    i+=2;
  },180);
}

const rawSensor={accelX:0,accelY:0,accelZ:-1,gyroX:0,gyroY:0,gyroZ:0,

function sliderRow(id,label,min,max,step,key){
  return `<div class="srow"><label>${label}</label>
    <input type="range" id="s-${id}" min="${min}" max="${max}" step="${step}"
      value="${rawSensor[key]||0}"
      oninput="document.getElementById('sv-${id}').textContent=this.value;rawSensor['${key}']=parseFloat(this.value);updateMagnitudes()">
    <span class="val" id="sv-${id}">${rawSensor[key]||0}</span></div>`;
}

function sliderRowDual(id1,label1,id2,label2,min,max,step){
  return `<div class="srow">
    <label>${label1}</label>
    <input type="range" id="s-${id1}" min="${min}" max="${max}" step="${step}" value="0"
      oninput="document.getElementById('sv-${id1}').textContent=this.value;rawSensor.${id1}=parseFloat(this.value);updateMagnitudes()">
    <span class="val" id="sv-${id1}">0</span></div>
    <div class="srow">
    <label>${label2}</label>
    <input type="range" id="s-${id2}" min="${min}" max="${max}" step="${step}" value="0"
      oninput="document.getElementById('sv-${id2}').textContent=this.value;rawSensor.${id2}=parseFloat(this.value);updateMagnitudes()">
    <span class="val" id="sv-${id2}">0</span></div>`;
}

function updateMagnitudes(){
  const ax=rawSensor.accelX,ay=rawSensor.accelY,az=rawSensor.accelZ;
  const accelMag=Math.sqrt(ax*ax+ay*ay+az*az);
  document.getElementById('s-accelMag').textContent=accelMag.toFixed(2);
  
  const gx=rawSensor.gyroX,gy=rawSensor.gyroY,gz=rawSensor.gyroZ;
  const gyroRate=Math.sqrt(gx*gx+gy*gy+gz*gz);
  document.getElementById('s-gyroRate').textContent=Math.round(gyroRate);
}

function checkSensorTriggers(){
  const ax=rawSensor.accelX,ay=rawSensor.accelY,az=rawSensor.accelZ;
  const accelMag=Math.sqrt(ax*ax+ay*ay+az*az);
  const gx=rawSensor.gyroX,gy=rawSensor.gyroY,gz=rawSensor.gyroZ;
  const gyroRate=Math.sqrt(gx*gx+gy*gy+gz*gz);
  const roll=Math.atan2(ay,az)*180/Math.PI;
  const pitch=Math.atan2(-ax,Math.sqrt(ay*ay+az*az))*180/Math.PI;
  const speed=rawSensor.speed||0;
  
  // 从 JSON 或默认获取触发条件
  const triggers=jsonLoaded&&exprCfg.sensorTriggers?exprCfg.sensorTriggers:{};
  
  const fired=[];
  for(const[k,v] of Object.entries(triggers)){
    let match=false;
    if(v.pitch!==undefined&&Math.abs(pitch-Math.abs(v.pitch))<20) match=true;
    else if(v.roll!==undefined&&Math.abs(roll)>Math.abs(v.roll)*0.7) match=true;
    else if(v.gyroRate!==undefined&&gyroRate>v.gyroRate*0.7) match=true;
    else if(v.speedKmh!==undefined&&speed>v.speedKmh*0.7) match=true;
    else if(v.accelBelow!==undefined&&accelMag<v.accelBelow) match=true;
    else if(v.stillSeconds!==undefined&&rawSensor.stillSec>v.stillSeconds) match=true;
    else if(v.luxBelow!==undefined&&rawSensor.light<v.luxBelow) match=true;
    else if(v.altChange!==undefined&&((v.altChange>0&&rawSensor.altitude>v.altChange)||(v.altChange<0&&rawSensor.altitude<v.altChange))) match=true;
    else if(v.stepsPerMin!==undefined&&rawSensor.steps>v.stepsPerMin) match=true;
    else if(v.proximity!==undefined&&v.proximity===rawSensor.proximity) match=true;
    else if(v.tempAbove!==undefined&&rawSensor.temp>v.tempAbove) match=true;
    if(match) fired.push({id:k,expr:v.e,sec:v.t||2});
  }
  
  // 无 JSON 时用默认逻辑
  if(!jsonLoaded){
    if(accelMag>2.5) fired.push({id:'shake',expr:'confused',sec:3});
    if(pitch<-25) fired.push({id:'upsideDown',expr:'surprised',sec:2.5});
    if(Math.abs(roll)>30) fired.push({id:'tilted',expr:'confused',sec:2});
    if(gyroRate>250) fired.push({id:'fastSpin',expr:'confused',sec:3});
    if(speed>12) fired.push({id:'fastMoving',expr:'excited',sec:3});
    if(accelMag<0.3&&accelMag>0) fired.push({id:'freeFall',expr:'scared',sec:3});
    if(rawSensor.stillSec>50) fired.push({id:'stillLong',expr:'sleepy',sec:4});
    if(rawSensor.light<8) fired.push({id:'lightDark',expr:'sleepy',sec:4});
    if(rawSensor.altitude>2.5) fired.push({id:'altitudeUp',expr:'surprised',sec:3});
    if(rawSensor.altitude<-2.5) fired.push({id:'altitudeDown',expr:'scared',sec:3});
    if(rawSensor.proximity) fired.push({id:'faceClose',expr:'shy',sec:2});
    if(accelMag<0.5&&Math.abs(roll)>8) fired.push({id:'pickedUp',expr:'surprised',sec:3});
  }
  
  const el=document.getElementById('s-fireResult');
  if(fired.length){
    el.innerHTML='触发: '+fired.map(f=>`<span style="color:#fff">${f.id}</span>→${DISPLAY[f.expr]||f.expr}(${f.sec}s)`).join(' | ');
    // 触发第一个匹配的
    const f=fired[0];
    setMood(f.expr);
    autoPlaySound(f.expr);
    if(sensorTimer){ clearTimeout(sensorTimer); sensorTimer=null; }
    sensorTimer=setTimeout(()=>{ setMood('normal'); },f.sec*1000);
    log(`[传感器模拟] 触发 ${fired.map(f=>f.id).join(', ')}`, 'info');
  }else{
    el.innerHTML='<span style="color:var(--muted)">无触发</span>';
  }
}

可用情绪词：normal, happy, veryHappy, excited, surprised, sad, angry, scared, bored, sleepy, love, shy, confused, suspicious, focused, cool, wink

规则：

示例：
用户"今天好开心" → happy

function detectCommand(text){
  // 优先用 JSON 中的指令
  if(jsonLoaded && exprCfg.commands){
    for(const[k,v] of Object.entries(exprCfg.commands)){
      if(text.includes(k)) return {expr:v.e,cmd:v.c||k};
    }
  }
  // 默认指令
  const defs=[{words:['拍照','照相','拍一张'],expr:'excited',cmd:'camera'},{words:['你好','嗨','hello','hi'],expr:'happy',cmd:'greeting'},{words:['拜拜','再见','bye'],expr:'sad',cmd:'sadness'},{words:['什么','啥','?','？'],expr:'confused',cmd:'curious'},];
  for(const c of defs){
    for(const w of c.words){ if(text.includes(w)) return c; }
  }
  return null;
}

function parseEmotion(text){
  const word=text.trim().replace(/[.,!?;:。，！？；：]+$/,'').toLowerCase();
  const valid=['normal','happy','veryhappy','excited','surprised','sad','angry','scared','bored','sleepy','love','shy','confused','suspicious','focused','cool','wink'];
  if(valid.includes(word)) return word;
  // 优先 JSON 关键词
  if(jsonLoaded && exprCfg.emotionKeywords){
    for(const[k,words] of Object.entries(exprCfg.emotionKeywords)){
      for(const w of words){ if(text.includes(w)) return k; }
    }
  }
  // 默认关键词 fallback
  const map={开心:'happy',快乐:'happy',哈哈:'happy',难过:'sad',伤心:'sad',累:'sleepy',困:'sleepy',气:'angry',烦:'angry',怕:'scared',恐怖:'scared',无聊:'bored',爱:'love',喜欢:'love',害羞:'shy',奇怪:'confused',怀疑:'suspicious',专注:'focused',酷:'cool',帅:'cool',哇:'surprised',惊讶:'surprised',};
  for(const[k,v] of Object.entries(map)){ if(text.includes(k)) return v; }
  return 'normal';
}

let idleExpressions=['normal','cool','happy','thinking','wink','focused','normal','shy','listening','normal'];
let idleIndex=0, idleTimer=null, idleActive=true;

function startIdleCycle(){
  idleActive=true;
  const cycle=jsonLoaded&&exprCfg.idleExpressions.length?exprCfg.idleExpressions:idleExpressions;
  idleIndex=0;
  if(idleTimer) clearInterval(idleTimer);
  idleTimer=setInterval(()=>{
    if(!idleActive||activeSensor) return;
    const expr=cycle[idleIndex%cycle.length];
    setMood(expr);
    // 随机视线扫视
    const lx=(Math.random()-0.5)*0.3;
    const ly=(Math.random()-0.5)*0.2;
    setLook(lx,ly);
    idleIndex++;
  },3000);
}

function stopIdleCycle(){ idleActive=false; }

    if(useProxy){
      r=await fetch('http://localhost:8765/?target='+encodeURIComponent(cfg.balanceApi),{headers:{'Authorization':'Bearer '+cfg.key}});

      r=await fetch(cfg.balanceApi,{headers:{'Authorization':'Bearer '+cfg.key}});

    const j=await r.json();
    if(j.data&&j.data.totalBalance){
      document.getElementById('balance').textContent='¥'+j.data.totalBalance;
      log('余额: ¥'+j.data.totalBalance,'info');
    }else{
      document.getElementById('balance').textContent='解析失败';
      log('余额响应: '+JSON.stringify(j),'error');
    }
  }catch(e){ log('余额查询失败: '+e.message,'error'); }
}

async function send(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  
  const cfg=getConfig();
  if(!cfg.key){ log('请先填写 API Key','error'); return; }
  
  addMsg('user', text);
  log(`用户: ${text}`);
  addMsg('ai', '思考中...');
  stopIdleCycle();
  
  // 指令检测
  const cmd=detectCommand(text);
  if(cmd){
    setMood(cmd.expr);
    autoPlaySound(cmd.cmd||cmd.expr);
    startIdleCycle();
    log(`指令匹配: ${cmd.cmd} → ${cmd.expr}`);
    document.querySelector('#chatBox .msg.ai:last-child .bubble').textContent=`[指令: ${cmd.cmd}]`;
    document.querySelector('#chatBox .msg.ai:last-child .tag').textContent=EMOJI[cmd.expr]+' '+DISPLAY[cmd.expr];
    document.querySelector('#chatBox .msg.ai:last-child .tag').dataset.emotion='1';
    return;
  }
  
  // 调用 AI
  try{
    const msgs=[{role:'system',content:SYSTEM_PROMPT},...history,{role:'user',content:text}];
    const reqBody={model:cfg.model,messages:msgs,temperature:0.7,max_tokens:20};
    
    log(`📤 POST ${cfg.endpoint}`, 'info');
    log(`   模型: ${cfg.model} | 历史: ${history.length}轮`, 'info');
    log(`   输入: "${text.substring(0,40)}${text.length>40?'...':''}"`, 'info');
    
    const startTime=Date.now();
    let r;
    try{
      const useProxy=document.getElementById('useProxy').checked;
      if(useProxy){
        const proxyUrl='http://localhost:8765/?target='+encodeURIComponent(cfg.endpoint);
        log('   使用代理: '+proxyUrl, 'info');
        r=await fetch(proxyUrl,{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},
          body:JSON.stringify(reqBody)
        });
      }else{
        r=await fetch(cfg.endpoint,{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},
          body:JSON.stringify(reqBody)
        });
      }
    }catch(fetchErr){
      if(fetchErr.message.includes('Failed to fetch')||fetchErr.name==='TypeError'){
        log('❌ CORS/网络错误: 浏览器阻止了跨域请求，需用代理', 'error');
        log('   方案1: 启动本地代理 python proxy.py', 'info');
        log('   方案2: 用Python/curl直接调试', 'info');
        const last=document.querySelector('#chatBox .msg.ai:last-child');
        last.querySelector('.bubble').textContent='CORS错误：需代理';
        last.querySelector('.bubble').style.color='var(--danger)';
        last.querySelector('.tag').textContent='❌';
        return;
      }
      throw fetchErr;
    }
    
    const elapsed=Date.now()-startTime;
    log(`📥 HTTP ${r.status} | ${elapsed}ms`, r.ok?'info':'error');
    
    const j=await r.json();
    log(`   响应体: ${JSON.stringify(j).substring(0,200)}`, 'info');
    if(!r.ok){
      const errMsg=j.error?.message||j.error?.code||('HTTP '+r.status);
      log(`   ❌ 错误: ${errMsg}`, 'error');
      throw new Error(errMsg);
    }
    
    const aiText=j.choices?.[0]?.message?.content||'';
    const tokens=j.usage?.total_tokens||0;
    totalTokens+=tokens;
    
    log(`   AI原文: "${aiText}" | token: ${tokens}`);
    
    const emotion=parseEmotion(aiText);
    setMood(emotion);
    autoPlaySound(emotion);
    
    const last=document.querySelector('#chatBox .msg.ai:last-child');
    last.querySelector('.bubble').textContent=aiText||'(空)';
    last.querySelector('.tag').textContent=EMOJI[emotion]+' '+DISPLAY[emotion];
    last.querySelector('.tag').dataset.emotion='1';
    
    log(`😊 情绪: ${emotion} → ${DISPLAY[emotion]} | 累计${totalTokens}t`);
    
    history.push({role:'user',content:text},{role:'assistant',content:aiText});
    if(history.length>20) history=history.slice(-20);
    startIdleCycle();
    
  }catch(e){
    startIdleCycle();
    const last=document.querySelector('#chatBox .msg.ai:last-child');
    last.querySelector('.bubble').textContent='错误: '+e.message;
    last.querySelector('.bubble').style.color='var(--danger)';
    last.querySelector('.tag').textContent='❌';
    log('AI错误: '+e.message,'error');
  }
}

function clearChat(){
  document.getElementById('chatBox').innerHTML='';
  document.getElementById('logArea').innerHTML='';
  history=[];
  totalTokens=0;
  setMood('normal');
  log('对话已清空','info');
}

// Init
document.addEventListener('DOMContentLoaded',()=>{
  // 从 localStorage 恢复配置
  ['apiEndpoint','aiModel','apiKey','balanceApi'].forEach(id=>{
    const v=localStorage.getItem('debug_'+id);
    if(v) document.getElementById(id).value=v;
    document.getElementById(id).addEventListener('change',()=>{
      localStorage.setItem('debug_'+id,document.getElementById(id).value);
    });
  });
  const proxyOn=localStorage.getItem('debug_useProxy')==='1';
  document.getElementById('useProxy').checked=proxyOn;
  buildSensorBar();
  startIdleCycle();
  log('就绪 - 填写 API Key 后即可调试','info');
  log('CORS报错请启动代理: python proxy.py 并勾选"代理"','info');
});
</script>
