name: Build IPA for AltStore

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  SCHEME: SmartAssistant
  PROJECT: SmartAssistant.xcodeproj
  EXPORT_DIR: ./build

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-path
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la *.xcodeproj

      - name: Build archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$EXPORT_DIR/$SCHEME.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="CI"

      - name: Export IPA
        run: |
          # Create temporary ExportOptions.plist
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string></string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath "$EXPORT_DIR/$SCHEME.xcarchive" \
            -exportPath "$EXPORT_DIR/$SCHEME" \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify IPA
        run: |
          IPA_PATH="$EXPORT_DIR/$SCHEME/$SCHEME.ipa"
          if [ -f "$IPA_PATH" ]; then
            echo "✅ IPA created successfully!"
            ls -lh "$IPA_PATH"
            echo ""
            echo "📱 IPA Info:"
            unzip -l "$IPA_PATH" | head -20
          else
            echo "❌ IPA not found! Checking export directory..."
            find "$EXPORT_DIR" -type f
            exit 1
          fi

      - name: Create Payload structure (for AltStore)
        run: |
          mkdir -p "$EXPORT_DIR/Payload"
          cp -R "$EXPORT_DIR/$SCHEME.xcarchive/Products/Applications/$SCHEME.app" "$EXPORT_DIR/Payload/"
          cd "$EXPORT_DIR"
          zip -r "$SCHEME-unsigned.ipa" Payload/
          echo "Created unsigned IPA for AltStore"
          ls -lh "$SCHEME-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartAssistant-${{ github.sha }}
          path: |
            ${{ env.EXPORT_DIR }}/${{ env.SCHEME }}/${{ env.SCHEME }}.ipa
            ${{ env.EXPORT_DIR }}/${{ env.SCHEME }}-unsigned.ipa
          retention-days: 90
          compression-level: 6

      - name: Upload dSYM (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: SmartAssistant-dSYM-${{ github.sha }}
          path: ${{ env.EXPORT_DIR }}/${{ env.SCHEME }}.xcarchive/dSYMs/
          retention-days: 90

  # 可选：代码检查
  lint:
    name: SwiftLint
    runs-on: macos-15
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint --strict
          else
            echo "SwiftLint not installed, skipping..."
          fi
        continue-on-error: true

  # 可选：测试
  test:
    name: Run Tests
    runs-on: macos-15
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true
