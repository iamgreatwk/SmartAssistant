name: Build IPA for AltStore

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  SCHEME: SmartAssistant
  PROJECT: SmartAssistant.xcodeproj
  EXPORT_DIR: ./build

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          echo "Default Xcode:"
          xcodebuild -version
          echo ""
          echo "Available Xcodes:"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "listing..."
          sudo xcode-select -s /Applications/Xcode_16.app 2>/dev/null || sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || sudo xcode-select -s /Applications/Xcode_16.1.app 2>/dev/null || sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || true
          echo ""
          echo "Selected Xcode:"
          xcodebuild -version
          xcrun --show-sdk-path
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la *.xcodeproj

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$EXPORT_DIR/$SCHEME.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="CI" \
            2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "===== COMPILATION ERRORS ====="
            grep -E "error:|warning:" /tmp/build.log | head -60 || true
            echo "===== END ERRORS ====="
            exit $EXIT
          fi

      - name: Package IPA
        run: |
          APP_PATH="$EXPORT_DIR/$SCHEME.xcarchive/Products/Applications/$SCHEME.app"
          echo "App path: $APP_PATH"
          ls -la "$APP_PATH"
          
          # Create Payload structure for unsigned IPA
          mkdir -p "$EXPORT_DIR/Payload"
          cp -R "$APP_PATH" "$EXPORT_DIR/Payload/"
          
          cd "$EXPORT_DIR"
          zip -r "$SCHEME.ipa" Payload/
          echo "✅ IPA created!"
          ls -lh "$SCHEME.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartAssistant-${{ github.sha }}
          path: ${{ env.EXPORT_DIR }}/${{ env.SCHEME }}.ipa
          retention-days: 90
          compression-level: 6

      - name: Upload dSYM (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: SmartAssistant-dSYM-${{ github.sha }}
          path: ${{ env.EXPORT_DIR }}/${{ env.SCHEME }}.xcarchive/dSYMs/
          retention-days: 90

  # 可选：代码检查
  lint:
    name: SwiftLint
    runs-on: macos-14
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint --strict
          else
            echo "SwiftLint not installed, skipping..."
          fi
        continue-on-error: true

  # 可选：测试
  test:
    name: Run Tests
    runs-on: macos-14
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true
