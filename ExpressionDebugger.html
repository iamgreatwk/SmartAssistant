<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小智表情调试器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#ccc;font-family:-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
.left{width:340px;background:#111118;padding:8px;overflow-y:auto;border-right:1px solid #222}
.right{flex:1;display:flex;align-items:center;justify-content:center;background:#050508}
svg{width:100%;max-width:600px;aspect-ratio:2/1}
h2{font-size:13px;color:#888;margin:6px 0 3px}
input,textarea,select{width:100%;padding:3px 5px;margin:1px 0;background:#1a1a28;border:1px solid #333;border-radius:3px;color:#aaa;font-size:11px}
textarea{resize:vertical;font-family:monospace}
label{font-size:10px;color:#666}
.slider{width:100%;accent-color:#7cfc00;margin:0}
.toolbar{display:flex;gap:4px;margin-bottom:6px}
.toolbar button{padding:5px 10px;background:#1a2a18;border:1px solid #2a5a2a;color:#8e8;border-radius:3px;cursor:pointer;font-size:11px}
.toolbar button:hover{background:#1e301e}
.toolbar button.export{background:#1a1a2a;border-color:#2a2a5a;color:#88e}
.toolbar button.danger{background:#2a1a1a;border-color:#5a2a2a;color:#e88}
.tabs{display:flex;gap:2px;margin-bottom:6px}
.tab{padding:4px 10px;background:#1a1a28;border:1px solid #333;border-radius:4px 4px 0 0;cursor:pointer;font-size:11px;color:#777}
.tab.active{background:#222240;border-color:#444;color:#aaa}
.mood-btn{font-size:10px;padding:2px 5px;margin:1px}
.mood-btn.active{background:#1a3020;border-color:#3a7040}
.btns{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px}
.status{font-size:10px;color:#444;margin-top:4px}
.row{display:flex;gap:4px}.row>*{flex:1}
.section{display:none}.section.active{display:block}
.kv-row{display:flex;gap:4px;align-items:center;margin:2px 0}
.kv-row input{flex:1;font-size:10px}
.kv-row button{font-size:10px;padding:2px 8px}
.step-row{display:flex;gap:3px;align-items:center;margin:2px 0;font-size:10px}
.step-row input{width:60px;font-size:10px}
.step-row select{width:80px;font-size:10px}
</style>
</head>
<body>
<div class="left">
  <div class="toolbar">
    <button onclick="loadJSON()">📂 加载</button>
    <button onclick="exportJSON()" class="export">💾 导出</button>
    <button onclick="copyJSON()" class="danger">📋 复制</button>
  </div>
  <div class="status" id="status">请加载 expressions.json</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('face')">😊 表情</div>
    <div class="tab" onclick="switchTab('keyword')">🔤 关键词</div>
    <div class="tab" onclick="switchTab('seq')">🎬 序列</div>
    <div class="tab" onclick="switchTab('sensor')">📡 传感器</div>
    <div class="tab" onclick="switchTab('sys')">⚙ 系统</div>
    <div class="tab" onclick="switchTab('sound')">🔊 音效</div>
    <div class="tab" onclick="switchTab('cmd')">🎯 指令</div>
  </div>

  <!-- === 表情参数 === -->
  <div class="section active" id="sec-face">
    <div class="btns" id="moodBtns"></div>
    <div class="row" style="margin-bottom:4px">
      <button onclick="addNewMood()">+ 新建表情</button>
      <button class="danger" onclick="deleteCurrentMood()">删除当前</button>
    </div>
    <label>眼宽 <span id="vW">70</span></label><input type="range" min="30" max="100" value="70" class="slider" id="eyeW" oninput="updateParam()">
    <label>眼高 <span id="vH">58</span></label><input type="range" min="20" max="100" value="58" class="slider" id="eyeH" oninput="updateParam()">
    <label>圆角 <span id="vBR">24</span></label><input type="range" min="4" max="40" value="24" class="slider" id="br" oninput="updateParam()">
    <label>间距 <span id="vSB">20</span></label><input type="range" min="8" max="50" value="20" class="slider" id="sb" oninput="updateParam()">
    <div class="row">
      <div><label>左疲倦</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="lT" oninput="updateParam()"><span id="vLT">0.00</span></div>
      <div><label>右疲倦</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="rT" oninput="updateParam()"><span id="vRT">0.00</span></div>
    </div>
    <div class="row">
      <div><label>左生气</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="lA" oninput="updateParam()"><span id="vLA">0.00</span></div>
      <div><label>右生气</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="rA" oninput="updateParam()"><span id="vRA">0.00</span></div>
    </div>
    <div class="row">
      <div><label>左开心</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="lH" oninput="updateParam()"><span id="vLH">0.00</span></div>
      <div><label>右开心</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="rH" oninput="updateParam()"><span id="vRH">0.00</span></div>
    </div>
    <div class="row">
      <div><label>左平顶</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="lF" oninput="updateParam()"><span id="vLF">0.00</span></div>
      <div><label>右平顶</label><input type="range" min="0" max="1" step="0.01" value="0" class="slider" id="rF" oninput="updateParam()"><span id="vRF">0.00</span></div>
    </div>
    <div class="row">
      <div><label>左倍率</label><input type="range" min="0" max="2" step="0.01" value="1" class="slider" id="lM" oninput="updateParam()"><span id="vLM">1.00</span></div>
      <div><label>右倍率</label><input type="range" min="0" max="2" step="0.01" value="1" class="slider" id="rM" oninput="updateParam()"><span id="vRM">1.00</span></div>
    </div>
    <label>偏移 <span id="vYO">0</span></label><input type="range" min="-15" max="15" step="0.5" value="0" class="slider" id="yo" oninput="updateParam()">
    <h2>视线方向</h2>
    <div class="row">
      <div><label>左右 <span id="vLX">0.0</span></label><input type="range" min="-1" max="1" step="0.05" value="0" class="slider" id="lookX" oninput="let v=parseFloat(this.value);document.getElementById('vLX').textContent=v.toFixed(1);setLook(v,parseFloat(document.getElementById('lookY').value))"></div>
      <div><label>上下 <span id="vLY">0.0</span></label><input type="range" min="-1" max="1" step="0.05" value="0" class="slider" id="lookY" oninput="let v=parseFloat(this.value);document.getElementById('vLY').textContent=v.toFixed(1);setLook(parseFloat(document.getElementById('lookX').value),v)"></div>
    </div>
    <button onclick="document.getElementById('lookX').value=0;document.getElementById('lookY').value=0;setLook(0,0);document.getElementById('vLX').textContent='0.0';document.getElementById('vLY').textContent='0.0'">↺ 重置视线</button>
  </div>

  <!-- === 关键词 === -->
  <div class="section" id="sec-keyword">
    <h2>情绪关键词</h2>
    <select id="kwEmotion" onchange="loadKeywords()"><option>happy</option></select>
    <textarea id="kwList" rows="3" placeholder="每行一个关键词" onchange="saveKeywords()"></textarea>
  </div>

  <!-- === 序列（关键帧编辑器）=== -->
  <div class="section" id="sec-seq" style="display:flex;flex-direction:column;height:calc(100vh - 40px)">
    <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
      <select id="seqName" onchange="loadSequence()" style="width:100px"><option>greeting</option></select>
      <button onclick="renameSequence()">改名</button>
      <button onclick="addSequence()">+ 新建</button>
      <button class="danger" onclick="deleteSequence()">删除</button>
      <span style="flex:1"></span>
      <input type="number" id="seqBPM" value="171" step="10" min="30" max="600" style="width:60px" title="BPM">
      <label title="每帧时长=60000/BPM">ms/帧</label>
      <button onclick="playSequence()" style="background:#1a3a1a;border-color:#3a7a3a;color:#8e8">▶ 播放</button>
      <button onclick="stopSequence()">⏹ 停止</button>
    </div>
    <div style="display:flex;gap:4px;flex:1;min-height:0">
      <!-- 左侧：RoboEyes 预览 -->
      <div style="flex:1;background:#000;display:flex;align-items:center;justify-content:center;min-width:200px">
        <svg id="seqPreview" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet" style="width:100%;max-height:100%"></svg>
      </div>
      <!-- 右侧：关键帧参数 -->
      <div style="width:220px;overflow-y:auto;padding:4px;background:#0f0f18;font-size:10px">
        <h3>当前帧</h3>
        <select id="kfExpr" onchange="applyKeyframePreview()" style="width:100%"><option value="">(自定义参数)</option></select>
        <div class="row"><label>时间ms</label><input type="number" id="kfTime" onchange="syncKeyframeField()" style="width:60px"></div>
        <label>眼宽<input type="range" min="30" max="100" value="70" id="kfW" oninput="document.getElementById('kvW').textContent=this.value;applyKeyframePreview()"><span id="kvW">70</span></label>
        <label>眼高<input type="range" min="20" max="100" value="58" id="kfH" oninput="document.getElementById('kvH').textContent=this.value;applyKeyframePreview()"><span id="kvH">58</span></label>
        <label>圆角<input type="range" min="4" max="40" value="24" id="kfBR" oninput="document.getElementById('kvBR').textContent=this.value;applyKeyframePreview()"><span id="kvBR">24</span></label>
        <label>间距<input type="range" min="8" max="50" value="20" id="kfSB" oninput="document.getElementById('kvSB').textContent=this.value;applyKeyframePreview()"><span id="kvSB">20</span></label>
        <label>左疲倦<input type="range" min="0" max="1" step="0.01" value="0" id="kfLT" oninput="document.getElementById('kvLT').textContent=this.value;applyKeyframePreview()"><span id="kvLT">0</span></label>
        <label>右疲倦<input type="range" min="0" max="1" step="0.01" value="0" id="kfRT" oninput="document.getElementById('kvRT').textContent=this.value;applyKeyframePreview()"><span id="kvRT">0</span></label>
        <label>左生气<input type="range" min="0" max="1" step="0.01" value="0" id="kfLA" oninput="document.getElementById('kvLA').textContent=this.value;applyKeyframePreview()"><span id="kvLA">0</span></label>
        <label>右生气<input type="range" min="0" max="1" step="0.01" value="0" id="kfRA" oninput="document.getElementById('kvRA').textContent=this.value;applyKeyframePreview()"><span id="kvRA">0</span></label>
        <label>左开心<input type="range" min="0" max="1" step="0.01" value="0" id="kfLH" oninput="document.getElementById('kvLH').textContent=this.value;applyKeyframePreview()"><span id="kvLH">0</span></label>
        <label>右开心<input type="range" min="0" max="1" step="0.01" value="0" id="kfRH" oninput="document.getElementById('kvRH').textContent=this.value;applyKeyframePreview()"><span id="kvRH">0</span></label>
        <label>左平顶<input type="range" min="0" max="1" step="0.01" value="0" id="kfLF" oninput="document.getElementById('kvLF').textContent=this.value;applyKeyframePreview()"><span id="kvLF">0</span></label>
        <label>右平顶<input type="range" min="0" max="1" step="0.01" value="0" id="kfRF" oninput="document.getElementById('kvRF').textContent=this.value;applyKeyframePreview()"><span id="kvRF">0</span></label>
        <label>左倍率<input type="range" min="0" max="2" step="0.01" value="1" id="kfLM" oninput="document.getElementById('kvLM').textContent=this.value;applyKeyframePreview()"><span id="kvLM">1</span></label>
        <label>右倍率<input type="range" min="0" max="2" step="0.01" value="1" id="kfRM" oninput="document.getElementById('kvRM').textContent=this.value;applyKeyframePreview()"><span id="kvRM">1</span></label>
        <label>Y偏移<input type="range" min="-15" max="15" value="0" id="kfYO" oninput="document.getElementById('kvYO').textContent=this.value;applyKeyframePreview()"><span id="kvYO">0</span></label>
        <label>视线X<input type="range" min="-1" max="1" step="0.05" value="0" id="kfLX" oninput="document.getElementById('kvLX').textContent=this.value;applyKeyframePreview()"><span id="kvLX">0</span></label>
        <label>视线Y<input type="range" min="-1" max="1" step="0.05" value="0" id="kfLY" oninput="document.getElementById('kvLY').textContent=this.value;applyKeyframePreview()"><span id="kvLY">0</span></label>
        <button onclick="saveCurrentKeyframe()" style="margin:4px 0">💾 保存关键帧</button>
      </div>
    </div>
    <!-- 时间轴 -->
    <div style="margin-top:4px;background:#0f0f18;padding:6px;border-radius:4px;overflow-x:auto">
      <div id="timeline" style="display:flex;gap:2px;align-items:flex-end;min-height:50px"></div>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button onclick="addKeyframe()">+ 关键帧</button>
        <button onclick="deleteKeyframe()" class="danger">删除</button>
        <button onclick="duplicateKeyframe()">复制</button>
      </div>
    </div>
  </div>

  <!-- === 传感器 === -->
  <div class="section" id="sec-sensor">
    <h2>传感器触发</h2>
    <select id="trigName" onchange="loadTrigger()"><option>upsideDown</option></select>
    <div class="row">
      <label>表情<input id="trigE"></label>
      <label>音效<input id="trigS"></label>
      <label>持续(s)<input id="trigT" type="number" step="0.5"></label>
    </div>
    <h2 style="margin-top:6px">条件（AND）</h2>
    <div id="trigConds"></div>
    <label>JSON键<input id="trigNewKey" placeholder="如 speedKmh"></label>
    <label>值<input id="trigNewVal" type="number" step="0.1"></label>
    <button onclick="addTriggerCond()">+ 添加条件</button>
    <button onclick="saveTrigger()" style="margin-top:4px">💾 保存触发</button>
  </div>

  <!-- === 系统参数 === -->
  <div class="section" id="sec-sys">
    <h2>摇晃/敲击</h2>
    <div class="row"><div><label>摇晃表情</label><input id="sysShakeE"></div><div><label>音效</label><input id="sysShakeS"></div></div>
    <div class="row"><div><label>敲击表情</label><input id="sysKnockE"></div><div><label>音效</label><input id="sysKnockS"></div></div>
    <div class="row"><div><label>敲击视线X</label><input id="sysKnockLX" type="number" step="0.1"></div><div><label>视线Y</label><input id="sysKnockLY" type="number" step="0.1"></div></div>
    <h2>时间参数</h2>
    <div class="row"><div><label>摇晃阈值(g)</label><input id="sysShakeThr" type="number" step="0.1"></div><div><label>尖峰次数</label><input id="sysSpikeCnt" type="number" step="1"></div></div>
    <div class="row"><div><label>眩晕(s)</label><input id="sysDizzySec" type="number" step="0.5"></div><div><label>敲击阈值(g)</label><input id="sysKnockThr" type="number" step="0.1"></div></div>
    <div class="row"><div><label>敲击恢复(s)</label><input id="sysKnockSec" type="number" step="0.1"></div></div>
    <div class="row"><div><label>说话持续(s)</label><input id="sysSpeakSec" type="number" step="0.5"></div><div><label>循环间隔(s)</label><input id="sysCycleSec" type="number" step="0.5"></div></div>
    <div class="row"><div><label>指令持续(s)</label><input id="sysCmdSec" type="number" step="0.5"></div><div><label>错误恢复(s)</label><input id="sysErrSec" type="number" step="0.5"></div></div>
    <div class="row"><div><label>轮询间隔(s)</label><input id="sysEnrichSec" type="number" step="0.1"></div></div>
    <button onclick="saveSysConfig()" style="margin-top:4px">💾 保存系统配置</button>
    
    <h2>AI 配置</h2>
    <div class="row"><div><label>最大历史</label><input id="sysMaxHist" type="number" step="1"></div><div><label>请求超时(s)</label><input id="sysReqTimeout" type="number" step="5"></div></div>
    <div class="row"><div><label>资源超时(s)</label><input id="sysResTimeout" type="number" step="5"></div></div>
    
    <h2>反应配置</h2>
    <div class="row"><div><label>指令序列</label><input id="sysCmdSeq"></div><div><label>响应延迟(s)</label><input id="sysRespDelay" type="number" step="0.1"></div></div>
    <div class="row"><div><label>安慰表情</label><input id="sysComfortE"></div><div><label>安慰序列</label><input id="sysComfortS"></div></div>
    <div class="row"><div><label>错误表情</label><input id="sysErrE"></div><div><label>错误序列</label><input id="sysErrS"></div><div><label>错误音效</label><input id="sysErrSound"></div></div>
    <button onclick="saveReactionConfig()" style="margin-top:4px">💾 保存反应配置</button>
    
    <h2>默认视线</h2>
    <div class="row">
      <div><label>聆听X</label><input id="lookListX" type="number" step="0.1"></div><div><label>聆听Y</label><input id="lookListY" type="number" step="0.1"></div>
      <div><label>思考X</label><input id="lookThinkX" type="number" step="0.1"></div><div><label>思考Y</label><input id="lookThinkY" type="number" step="0.1"></div>
    </div>
    <div class="row"><div><label>错误X</label><input id="lookErrX" type="number" step="0.1"></div><div><label>错误Y</label><input id="lookErrY" type="number" step="0.1"></div></div>
    <h2>随机视线范围</h2>
    <div class="row">
      <div><label>空闲X</label><input id="lrIdleX" placeholder="-0.4,0.4"></div><div><label>空闲Y</label><input id="lrIdleY" placeholder="0.1,0.3"></div>
    </div>
    <div class="row">
      <div><label>说话X</label><input id="lrSpeakX" placeholder="-0.2,0.2"></div><div><label>说话Y</label><input id="lrSpeakY" placeholder="-0.25,0.25"></div>
    </div>
    <button onclick="saveLookConfig()" style="margin-top:4px">💾 保存视线配置</button>
  </div>

  <!-- === 音效管理 === -->
  <div class="section" id="sec-sound">
    <h2>音效文件映射</h2>
    <div class="row" style="margin-bottom:4px">
      <button onclick="addSoundRow()">+ 添加音效</button>
      <button onclick="saveSoundMap()">💾 保存</button>
    </div>
    <div id="soundList"></div>
    <h2 style="margin-top:6px">测试播放</h2>
    <div class="row">
      <select id="soundTestSelect" style="flex:1"></select>
      <button onclick="playTestSound()">▶ 播放</button>
      <button onclick="stopTestSound()">⏹ 停止</button>
    </div>
    <label style="margin-top:4px">或拖入音频文件测试:</label>
    <input type="file" id="soundFileInput" accept="audio/*" onchange="previewSoundFile(this)" style="font-size:10px">
  </div>

  <!-- === 指令 === -->
  <div class="section" id="sec-cmd">
    <h2>语音指令</h2>
    <div id="cmdList"></div>
    <div class="kv-row">
      <input id="cmdNewKey" placeholder="关键词">
      <input id="cmdNewExpr" placeholder="表情">
      <input id="cmdNewCmd" placeholder="命令ID">
      <button onclick="addCommand()">+</button>
    </div>
    <button onclick="saveCommands()" style="margin-top:4px">💾 保存指令</button>
  </div>
</div>
<div class="right"><svg id="sv" viewBox="0 0 400 200"></svg></div>

<script>
const W=400,H=200,CX=W/2,CY=H/2,MC='#7cfc00',BG='#050508',L=(a,b)=>(a+b)/2;
let moodData={normal:{eyeW:70,eyeH:58,br:24,sb:20,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0}};
let fullConfig=null,currentMood='normal';
let S={lxN:120,lyN:71,wN:70,hN:58,brN:24,sbN:20,lhN:58,rhN:58,lx:120,ly:71,w:70,h:58,br:24,sb:20,lh:58,rh:58,rx:0,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lTN:0,rTN:0,lAN:0,rAN:0,lHN:0,rHN:0,lFN:0,rFN:0,yoN:0,nextBlink:180};

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${{face:1,keyword:2,seq:3,sensor:4,sys:5,sound:6,cmd:7}[t]})`).classList.add('active');
  document.getElementById(`sec-${t}`).classList.add('active');
  if(t==='keyword') refreshKwDropdown();
  if(t==='seq') refreshSeqDropdown();
  if(t==='sensor') refreshTriggerDropdown();
  if(t==='sys') loadSysConfig();
  if(t==='sound') renderSoundTab();
  if(t==='cmd') renderCommands();
}

// === 表情 ===
function applyParams(){
  const m=moodData[currentMood];
  S.wN=m.eyeW;S.hN=m.eyeH;S.brN=m.br;S.sbN=m.sb;
  S.lhN=m.eyeH*m.lM;S.rhN=m.eyeH*m.rM;
  S.lTN=m.lT;S.rTN=m.rT;S.lAN=m.lA;S.rAN=m.rA;
  S.lHN=m.lH;S.rHN=m.rH;S.lFN=m.lF;S.rFN=m.rF;S.yoN=m.yo;
  S.lxN=CX-S.wN-S.sbN/2;S.lyN=CY-Math.max(S.lhN,S.rhN)/2;
}
function setMood(n){

let seqData={frames:[],name:'greeting'}, selectedFrame=-1, seqPlaying=false, seqTimer=null, seqStartTime=0, seqBPM=171;
function refreshSeqDropdown(){
  if(!fullConfig?.sequences)return;

function loadSequence(){
  const n=document.getElementById('seqName').value;seqData.name=n;selectedFrame=-1;
  seqData.frames=[];const old=fullConfig.sequences[n]||[];
  let t=0;const bpm=parseInt(document.getElementById('seqBPM').value)||171;
  const step=Math.round(60000/bpm);
  old.forEach(s=>{seqData.frames.push({t:t,e:s.e,x:s.x||0,y:s.y||0,b:s.b||false});t+=step;});
  if(seqData.frames.length===0) seqData.frames=[{t:0,e:'normal',x:0,y:0,b:false}];
  // 填充表情下拉
  const sel=document.getElementById('kfExpr');sel.innerHTML='<option value="">(自定义参数)</option>';
  if(moodData) Object.keys(moodData).forEach(k=>{sel.innerHTML+=`<option>${k}</option>`;});

function renameSequence(){

  fullConfig.sequences[n]=fullConfig.sequences[old];delete fullConfig.sequences[old];

}
function addSequence(){

function syncToFullConfig(){
  const frames=seqData.frames.map(f=>{
    const obj={e:f.e,x:f.x||0,y:f.y||0,b:f.b||false};
    const nextIdx=seqData.frames.indexOf(f)+1;
    if(nextIdx<seqData.frames.length) obj.t=seqData.frames[nextIdx].t-f.t;
    return obj;
  });
  fullConfig.sequences[seqData.name]=frames;
}

function renderTimeline(){
  const el=document.getElementById('timeline');el.innerHTML='';
  if(seqData.frames.length===0) return;
  const maxT=Math.max(seqData.frames[seqData.frames.length-1].t,1);
  seqData.frames.forEach((f,i)=>{
    const left=(f.t/maxT*100).toFixed(1);
    const emoji=EMOJI[f.e]||'';const disp=DISPLAY[f.e]||f.e;
    const active=i===selectedFrame?' style="border-color:#7cfc00;background:#1a3018"':'';
    el.innerHTML+=`<div${active} class="step-row" onclick="selectKeyframe(${i})" style="position:relative;left:${left}%;cursor:pointer;transform:translateX(-50%)">
      <div style="font-size:8px;color:#666">${f.t}ms</div>
      <div>${emoji}${disp}</div>
      <input type="range" style="width:30px" min="${i>0?seqData.frames[i-1].t+50:f.t}" max="${i<seqData.frames.length-1?seqData.frames[i+1].t-50:f.t+1000}" value="${f.t}" onchange="moveKeyframe(${i},this.value);event.stopPropagation()">
    </div>`;
  });
}
function selectKeyframe(i){selectedFrame=i;renderTimeline();loadKeyframeToPanel();}
function moveKeyframe(i,newT){seqData.frames[i].t=parseInt(newT);seqData.frames.sort((a,b)=>a.t-b.t);selectedFrame=seqData.frames.findIndex(f=>f===seqData.frames[i]||f.t===parseInt(newT));renderTimeline();syncToFullConfig();}

function applyKeyframePreview(){
  if(selectedFrame<0)return;
  const e=document.getElementById('kfExpr').value;
  const params={
    w:parseInt(document.getElementById('kfW').value),h:parseInt(document.getElementById('kfH').value),
    br:parseInt(document.getElementById('kfBR').value),sb:parseInt(document.getElementById('kfSB').value),
    lT:parseFloat(document.getElementById('kfLT').value),rT:parseFloat(document.getElementById('kfRT').value),
    lA:parseFloat(document.getElementById('kfLA').value),rA:parseFloat(document.getElementById('kfRA').value),
    lH:parseFloat(document.getElementById('kfLH').value),rH:parseFloat(document.getElementById('kfRH').value),
    lF:parseFloat(document.getElementById('kfLF').value),rF:parseFloat(document.getElementById('kfRF').value),
    lM:parseFloat(document.getElementById('kfLM').value),rM:parseFloat(document.getElementById('kfRM').value),
    yo:parseFloat(document.getElementById('kfYO').value),
    x:parseFloat(document.getElementById('kfLX').value),y:parseFloat(document.getElementById('kfLY').value)
  };
  const w=params.w,h=params.h,br=params.br,sb=params.sb;
  const lh=h*params.lM,rh=h*params.rM;
  const lx=CX-w-sb/2+params.x*w*0.3,ly=CY-params.y*lh*0.3-Math.max(lh,rh)/2+params.yo;
  const rx=lx+w+sb;
  let html=`<rect width="400" height="200" fill="#000"/>`;
  html+=drawE(lx,ly,w,lh,br,params.lT,params.lA,params.lH,params.lF,'L');
  html+=drawE(rx,ly,w,rh,br,params.rT,params.rA,params.rH,params.rF,'R');
  document.getElementById('seqPreview').innerHTML=html;
}

let seqPlayTimer=null,seqPlayIndex=0;
function playSequence(){
  if(seqPlaying){stopSequence();return;}
  seqPlaying=true;seqPlayIndex=0;
  playNextFrame();
}
function stopSequence(){seqPlaying=false;if(seqPlayTimer)clearTimeout(seqPlayTimer);setMood('normal');}
function playNextFrame(){
  if(!seqPlaying||seqPlayIndex>=seqData.frames.length){stopSequence();return;}
  const f=seqData.frames[seqPlayIndex];
  const e=document.getElementById('kfExpr');e.value=f.e||'normal';
  const m=f.e&&moodData[f.e]?moodData[f.e]:null;
  if(m){S.wN=m.eyeW;S.hN=m.eyeH;S.brN=m.br;S.sbN=m.sb;S.lhN=m.h*m.lM;S.rhN=m.h*m.rM;S.lTN=m.lT;S.rTN=m.rT;S.lAN=m.lA;S.rAN=m.rA;S.lHN=m.lH;S.rHN=m.rH;S.lFN=m.lF;S.rFN=m.rF;S.yoN=m.yo;}
  S.lxN=CX-S.wN-S.sbN/2+f.x*S.wN*0.3;S.lyN=CY-f.y*S.lhN*0.3-Math.max(S.lhN,S.rhN)/2;
  const next=seqPlayIndex+1;const delay=next<seqData.frames.length?seqData.frames[next].t-f.t:350;
  seqPlayIndex++;seqPlayTimer=setTimeout(playNextFrame,Math.max(50,delay));
  document.getElementById('kfTime').value=f.t;document.getElementById('kvLX').textContent=f.x||0;document.getElementById('kvLY').textContent=f.y||0;
}

function updateSoundKey(oldKey,newKey){
  if(!newKey||newKey===oldKey) return;
  soundMap[newKey]=soundMap[oldKey]||'';
  delete soundMap[oldKey];
  fullConfig.soundMap=soundMap;
}
function deleteSound(name){ delete soundMap[name]; fullConfig.soundMap=soundMap; renderSoundTab(); }
function saveSoundMap(){ fullConfig.soundMap=soundMap; document.getElementById('status').textContent='✅ 音效配置已保存'; }

let testAudio=null;
function playTestSound(){
  if(testAudio){ testAudio.pause(); testAudio=null; }
  const name=document.getElementById('soundTestSelect').value;
  const file=soundMap[name];
  if(!file){ alert('该音效无文件，使用 beep 兜底'); return; }
  testAudio=new Audio(file);
  testAudio.volume=0.7;
  testAudio.onerror=()=>{ alert('文件未找到: '+file+' (需放在 HTML 同目录)'); testAudio=null; };
  testAudio.play();
}
function stopTestSound(){ if(testAudio){ testAudio.pause(); testAudio=null; } }
function previewSoundFile(input){
  const file=input.files[0]; if(!file) return;
  if(testAudio){ testAudio.pause(); }
  testAudio=new Audio(URL.createObjectURL(file));
  testAudio.volume=0.7; testAudio.play();
}

// === 渲染 ===
function drawE(lx,ly,w,h,br,tired,angry,happy,flat,tag){
  let s='';if(h<=0)return s;
  s+=`<rect x="${lx}" y="${ly}" width="${w}" height="${h}" rx="${br}" ry="${br}" fill="${MC}"/>`;
  if(flat>.05){let fh=h*flat;s+=`<rect x="${lx-1}" y="${ly-1}" width="${w+2}" height="${fh+1}" fill="${BG}"/>`}
  if(tired>.05){let th=h*tired;s+=tag==='L'?`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx},${ly+th-1}" fill="${BG}"/>`:`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx+w},${ly+th-1}" fill="${BG}"/>`}
  if(angry>.05){let ah=h*angry;s+=tag==='L'?`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx+w},${ly+ah}" fill="${BG}"/>`:`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx},${ly+ah}" fill="${BG}"/>`}
  if(happy>.05){let hh=h*happy;s+=`<rect x="${lx-1}" y="${ly+h-hh+1}" width="${w+2}" height="${h}" rx="${br}" fill="${BG}"/>`}
  return s;
}
function render(){
  S.lx=L(S.lx,S.lxN);S.ly=L(S.ly,S.lyN);S.w=L(S.w,S.wN);S.h=L(S.h,S.hN);
  S.br=L(S.br,S.brN);S.sb=L(S.sb,S.sbN);S.lh=L(S.lh,S.lhN);S.rh=L(S.rh,S.rhN);
  S.lT=L(S.lT,S.lTN);S.rT=L(S.rT,S.rTN);S.lA=L(S.lA,S.lAN);S.rA=L(S.rA,S.rAN);
  S.lH=L(S.lH,S.lHN);S.rH=L(S.rH,S.rHN);S.lF=L(S.lF,S.lFN);S.rF=L(S.rF,S.rFN);
  let yo=L(S.myo||0,S.yoN);S.myo=yo;let lw=S.w,rw=S.w,sb=S.sb;S.rx=S.lx+lw+sb;
  S.nextBlink--;let blink=S.nextBlink<6;let lh=blink?1:S.lh,rh=blink?1:S.rh;
  if(blink&&S.nextBlink===0)S.nextBlink=150+Math.floor(Math.random()*360);
  let h=`<rect width="${W}" height="${H}" fill="${BG}"/>`;
  h+=drawE(S.lx,S.ly+yo,lw,lh,S.br,S.lT,S.lA,S.lH,S.lF,'L');
  h+=drawE(S.rx,S.ly+yo,rw,rh,S.br,S.rT,S.rA,S.rH,S.rF,'R');
  document.getElementById('sv').innerHTML=h;requestAnimationFrame(render);
}
function initMoodBtns(){
  const b=document.getElementById('moodBtns');b.innerHTML='';
  Object.keys(moodData).forEach(k=>{const btn=document.createElement('button');btn.textContent=k;btn.className='mood-btn';btn.id='btn-'+k;btn.onclick=()=>setMood(k);b.appendChild(btn);});
}
function addNewMood(){
  const name=prompt('新表情名称 (英文, 如 custom1):'); if(!name||moodData[name]) return;
  moodData[name]={eyeW:70,eyeH:58,br:24,sb:20,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0};
  if(fullConfig) fullConfig.moods=moodData;
  initMoodBtns();setMood(name);
  document.getElementById('status').textContent='✅ 已添加: '+name;
}
function deleteCurrentMood(){
  if(!confirm('删除表情 "'+currentMood+'"?')) return;
  delete moodData[currentMood];
  if(fullConfig) fullConfig.moods=moodData;
  const names=Object.keys(moodData);
  if(names.length){ initMoodBtns();setMood(names[0]); }
  document.getElementById('status').textContent='✅ 已删除';
}
initMoodBtns();setMood('normal');requestAnimationFrame(render);
</script>
