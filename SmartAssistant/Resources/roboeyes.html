<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>*{margin:0;padding:0}html,body{background:#000;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}svg{width:100%;height:auto;max-height:100%}</style></head>
<body><svg id="s" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet"></svg><script>
const W=400,H=200,CX=200,CY=100,MC='#7cfc00',BG='#000',L=(a,b)=>(a+b)/2;
const MOODS={
normal:{w:70,h:58,br:24,sb:20,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},
tired:{w:72,h:56,br:20,sb:22,lT:.5,rT:.5,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},
angry:{w:68,h:56,br:18,sb:18,lT:0,rT:0,lA:.5,rA:.5,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},
happy:{w:64,h:50,br:22,sb:22,lT:0,rT:0,lA:0,rA:0,lH:.48,rH:.48,lF:0,rF:0,lM:1,rM:1,yo:0},
surprised:{w:78,h:72,br:32,sb:16,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},
sad:{w:64,h:50,br:22,sb:26,lT:.25,rT:.25,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:4},
scared:{w:52,h:46,br:18,sb:36,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:-2},
confused:{w:70,h:62,br:22,sb:20,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:.65,yo:-8},
focused:{w:62,h:48,br:16,sb:14,lT:0,rT:0,lA:.15,rA:.15,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},
bored:{w:70,h:44,br:12,sb:24,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:.35,rF:.35,lM:1,rM:1,yo:2},
sleepy:{w:68,h:28,br:12,sb:24,lT:.65,rT:.65,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:6},
suspicious:{w:68,h:56,br:20,sb:20,lT:0,rT:0,lA:.45,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:.85,yo:0},
love:{w:56,h:56,br:28,sb:24,lT:0,rT:0,lA:0,rA:0,lH:.55,rH:.55,lF:0,rF:0,lM:1,rM:1,yo:0},
dizzy:{w:66,h:56,br:20,sb:22,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:.8,rM:1.2,yo:6},
wink:{w:70,h:58,br:24,sb:20,lT:0,rT:0,lA:0,rA:0,lH:.3,rH:0,lF:0,rF:0,lM:1,rM:.08,yo:0},
proud:{w:66,h:52,br:22,sb:22,lT:0,rT:0,lA:0,rA:0,lH:.2,rH:.2,lF:0,rF:0,lM:1,rM:1,yo:-6},
listening:{w:74,h:62,br:26,sb:18,lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},
thinking:{w:62,h:48,br:16,sb:14,lT:0,rT:0,lA:.15,rA:.15,lH:0,rH:0,lF:0,rF:0,lM:1,rM:1,yo:0},
shy:{w:56,h:56,br:26,sb:24,lT:0,rT:0,lA:0,rA:0,lH:.4,rH:.4,lF:0,rF:0,lM:1,rM:1,yo:0},
cool:{w:66,h:52,br:22,sb:22,lT:0,rT:0,lA:0,rA:0,lH:.2,rH:.2,lF:0,rF:0,lM:1,rM:1,yo:-6}
};
let S={lxN:120,lyN:71,wN:70,hN:58,brN:24,sbN:20,lhN:58,rhN:58,
lx:120,ly:71,w:70,h:58,br:24,sb:20,lh:58,rh:58,rx:0,
lT:0,rT:0,lA:0,rA:0,lH:0,rH:0,lF:0,rF:0,
lTN:0,rTN:0,lAN:0,rAN:0,lHN:0,rHN:0,lFN:0,rFN:0,yoN:0,
nextBlink:180,dirty:true};

function setMood(n){
  const a={veryHappy:'happy',excited:'surprised',speaking:'normal',dizzy:'confused',tired:'sleepy',proud:'cool'};
  const m=MOODS[a[n]||n]||MOODS['normal'];
  S.wN=m.w;S.hN=m.h;S.brN=m.br;S.sbN=m.sb;
  S.lhN=m.h*m.lM;S.rhN=m.h*m.rM;
  S.lTN=m.lT;S.rTN=m.rT;S.lAN=m.lA;S.rAN=m.rA;
  S.lHN=m.lH;S.rHN=m.rH;S.lFN=m.lF;S.rFN=m.rF;S.yoN=m.yo;
  S.lxN=CX-S.wN-S.sbN/2;S.lyN=CY-Math.max(S.lhN,S.rhN)/2;
  S.dirty=true;
}
function setLook(x,y){S.lxN=CX+x*S.wN*0.3-S.wN-S.sbN/2;S.lyN=CY-y*S.lhN*0.3-Math.max(S.lhN,S.rhN)/2;S.dirty=true;}

function dE(lx,ly,w,h,br,tired,angry,happy,flat,tag){
  let s='';if(h<=0)return s;
  s+=`<rect x="${lx}" y="${ly}" width="${w}" height="${h}" rx="${br}" ry="${br}" fill="${MC}"/>`;
  if(flat>.05){let fh=h*flat;s+=`<rect x="${lx-1}" y="${ly-1}" width="${w+2}" height="${fh+1}" fill="${BG}"/>`;}
  if(tired>.05){let th=h*tired;
    s+=tag==='L'?`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx},${ly+th-1}" fill="${BG}"/>`
      :`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx+w},${ly+th-1}" fill="${BG}"/>`;}
  if(angry>.05){let ah=h*angry;
    s+=tag==='L'?`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx+w},${ly+ah}" fill="${BG}"/>`
      :`<polygon points="${lx},${ly-1} ${lx+w},${ly-1} ${lx},${ly+ah}" fill="${BG}"/>`;}
  if(happy>.05){let hh=h*happy;s+=`<rect x="${lx-1}" y="${ly+h-hh+1}" width="${w+2}" height="${h}" rx="${br}" fill="${BG}"/>`;}
  return s;
}

let lastSVG='';
function render(){
  S.lx=L(S.lx,S.lxN);S.ly=L(S.ly,S.lyN);S.w=L(S.w,S.wN);S.h=L(S.h,S.hN);
  S.br=L(S.br,S.brN);S.sb=L(S.sb,S.sbN);S.lh=L(S.lh,S.lhN);S.rh=L(S.rh,S.rhN);
  S.lT=L(S.lT,S.lTN);S.rT=L(S.rT,S.rTN);S.lA=L(S.lA,S.lAN);S.rA=L(S.rA,S.rAN);
  S.lH=L(S.lH,S.lHN);S.rH=L(S.rH,S.rHN);S.lF=L(S.lF,S.lFN);S.rF=L(S.rF,S.rFN);
  let yo=L(S.myo||0,S.yoN);S.myo=yo;
  let lw=S.w,rw=S.w,sb=S.sb;S.rx=S.lx+lw+sb;
  S.nextBlink--;let blink=S.nextBlink<6;
  let lh=blink?1:S.lh,rh=blink?1:S.rh;
  if(blink&&S.nextBlink===0){S.nextBlink=150+Math.floor(Math.random()*360);}
  let h=`<rect width="${W}" height="${H}" fill="${BG}"/>`;
  h+=dE(S.lx,S.ly+yo,lw,lh,S.br,S.lT,S.lA,S.lH,S.lF,'L');
  h+=dE(S.rx,S.ly+yo,rw,rh,S.br,S.rT,S.rA,S.rH,S.rF,'R');
  if(h!==lastSVG){lastSVG=h;document.getElementById('s').innerHTML=h;}
  requestAnimationFrame(render);
}
setMood('normal');
requestAnimationFrame(render);
</script></body></html>
